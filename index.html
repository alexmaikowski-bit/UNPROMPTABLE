function useInView(t=.1){const r=useRef(null);const[v,setV]=useState(false);
  useEffect(()=>{const el=r.current;if(!el)return;
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true)},{threshold:t});
    o.observe(el);return()=>o.disconnect()},[]);return[r,v]}

function Reveal({children,delay=0,style={},from="bottom"}){
  const[ref,vis]=useInView(.08);
  const t={bottom:"translateY(50px)",left:"translateX(-50px)",right:"translateX(50px)",none:"none"};
  return <div ref={ref} style={{opacity:vis?1:0,transform:vis?"none":t[from],
    transition:`opacity .9s ease ${delay}s, transform .9s ease ${delay}s`,...style}}>{children}</div>;
}

function BlinkCursor(){const[on,setOn]=useState(true);
  useEffect(()=>{const i=setInterval(()=>setOn(p=>!p),530);return()=>clearInterval(i)},[]);
  return <span style={{display:"inline-block",width:2,height:"1.1em",background:on?NEON:"transparent",verticalAlign:"text-bottom",marginLeft:1}}/>}

function MadLibBlank({color=NEON,width=100,active=false}){
  return <span style={{display:"inline-block",width,borderBottom:`2px solid ${color}`,position:"relative",margin:"0 4px",verticalAlign:"baseline"}}>
    {active && <BlinkCursor/>}</span>}

// Glitch text that randomly scrambles
function GlitchText({children,style={}}){
  const[txt,setTxt]=useState(children);
  const ref=useRef(null);
  useEffect(()=>{
    let raf;const chars="!<>-_\\/[]{}—=+*^?#";
    const original=children;
    const onEnter=()=>{
      let i=0;const dur=22;
      const tick=()=>{
        let out="";for(let k=0;k<original.length;k++){
          if(k<i)out+=original[k];
          else if(original[k]===" ")out+=" ";
          else out+=chars[Math.floor(Math.random()*chars.length)];
        }
        setTxt(out);
        i+=.6;
        if(i<original.length)raf=requestAnimationFrame(tick);
        else setTxt(original);
      };
      tick();
    };
    const el=ref.current;el&&el.addEventListener("mouseenter",onEnter);
    return()=>{el&&el.removeEventListener("mouseenter",onEnter);cancelAnimationFrame(raf)};
  },[children]);
  return <span ref={ref} style={style}>{txt}</span>;
}

// Draggable sticker
function Sticker({src,top,left,rot=0,size=90,z=5}){
  const[pos,setPos]=useState({x:0,y:0});
  const dragging=useRef(false);const start=useRef({x:0,y:0,px:0,py:0});
  const onDown=e=>{const t=e.touches?e.touches[0]:e;dragging.current=true;
    start.current={x:t.clientX,y:t.clientY,px:pos.x,py:pos.y}};
  const onMove=e=>{if(!dragging.current)return;
    const t=e.touches?e.touches[0]:e;
    setPos({x:start.current.px+(t.clientX-start.current.x),y:start.current.py+(t.clientY-start.current.y)})};
  const onUp=()=>{dragging.current=false};
  useEffect(()=>{
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    window.addEventListener("touchmove",onMove);window.addEventListener("touchend",onUp);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);
      window.removeEventListener("touchmove",onMove);window.removeEventListener("touchend",onUp)};
  },[]);
  return <img src={src} alt="" className="sticker" draggable={false}
    onMouseDown={onDown} onTouchStart={onDown}
    style={{top,left,width:size,height:size,objectFit:"cover",zIndex:z,
      transform:`translate(${pos.x}px,${pos.y}px) rotate(${rot}deg)`,
      border:`2px solid ${NEON}`,boxShadow:`4px 4px 0 ${CYAN}`,borderRadius:4}}/>
}

// Marquee
function Marquee({items,speed="",color=NEON,bg=DARK2}){
  const content=[...items,...items,...items,...items];
  return <div style={{background:bg,borderTop:`1px solid ${DARK4}`,borderBottom:`1px solid ${DARK4}`,overflow:"hidden",padding:"14px 0"}}>
    <div className={`marquee ${speed}`}>
      {content.map((it,i)=><span key={i} style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:i%3===0?color:WHITE,letterSpacing:2,padding:"0 28px",display:"flex",alignItems:"center",gap:24}}>
        {it}<span style={{color:color,fontSize:24}}>✦</span></span>)}
    </div></div>
}

function SlopExamples(){
  const[idx,setIdx]=useState(0);
  useEffect(()=>{const i=setInterval(()=>setIdx(p=>(p+1)%SLOP.length),7000);return()=>clearInterval(i)},[]);
  const s=SLOP[idx];
  const Pill=({children,c})=><span style={{display:"inline-block",background:`${c}22`,color:c,borderBottom:`2px solid ${c}`,padding:"0 8px",margin:"0 3px",fontWeight:500}}>{children}</span>;
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
      <span className="label" style={{color:MUTED}}>▸ Field Note</span>
      <div style={{display:"flex",gap:6}}>
        {SLOP.map((_,i)=>(
          <button key={i} onClick={()=>setIdx(i)} aria-label={`slop ${i+1}`}
            style={{width:i===idx?28:10,height:6,background:i===idx?AMBER:DARK4,border:"none",cursor:"pointer",transition:"all .3s",padding:0}}/>
        ))}
      </div>
      <span className="meta" style={{marginLeft:"auto"}}>{s.who}</span>
    </div>
    <div key={idx} style={{padding:"32px 38px",background:DARK3,border:`1px solid ${DARK4}`,borderLeft:`3px solid ${AMBER}`,animation:"fadeIn .5s ease"}}>
      <p style={{fontSize:17,color:LIGHT,lineHeight:2.2}}>
        I tried <Pill c={CYAN}>{s.tried}</Pill>. I expected <Pill c={GREEN}>{s.expected}</Pill>. What I got was <Pill c={AMBER}>{s.got}</Pill> — because <Pill c={NEON}>{s.why}</Pill>.
      </p>
    </div>
  </div>;
}

                </p>
                <p style={{color:LIGHT,fontSize:13,lineHeight:1.65,marginTop:10}}>
                  Every other piece of this program is one-to-many. The Companion is the one-to-one layer — the moment a generic theme becomes a brief that maps to <span style={{color:WHITE}}>your job, your function, and the growth you're chasing</span>. It's what turns a monthly drumbeat into a personal development arc.
                </p>
              </div>
            </Reveal>
            <Reveal delay={.25}>
              <div style={{marginTop:40,display:"flex",flexDirection:"column",gap:6}}>
                {[
                  {label:"INPUT 01",title:"Job Function",color:NEON},
                  {label:"INPUT 02",title:"Growth Goal",color:CYAN},
                  {label:"INPUT 03",title:"AI Comfort Level",color:GREEN},
                ].map((inp,i)=>(
                  <div key={i} style={{padding:"16px 20px",background:DARK3,borderLeft:`3px solid ${inp.color}`,transform:i%2?"rotate(.3deg)":"rotate(-.3deg)"}}>
                    <span className="label" style={{color:inp.color}}>{inp.label}</span>
                    <h4 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:WHITE,letterSpacing:1,marginTop:4}}>{inp.title}</h4>
                  </div>
                ))}
              </div>
            </Reveal>
            <Reveal delay={.35}>
              <div style={{marginTop:24,padding:"16px 22px",background:DARK4,borderLeft:`3px solid ${VIOLET}`}}>
                <span className="label" style={{color:VIOLET}}>↓ Output</span>
                <p style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:LIGHT,marginTop:4}}>Personalized mission brief + agent recommendations</p>
              </div>
            </Reveal>
          </div>
          <div>
            <Reveal delay={.2}>
              <div style={{marginBottom:24,position:"relative"}}>
                <img src={GIFS.g7} alt="" style={{width:"100%",maxWidth:280,border:`2px solid ${CYAN}`,boxShadow:`8px 8px 0 ${NEON}`,transform:"rotate(2deg)"}}/>
              </div>
              <span className="label" style={{color:MUTED}}>6 Functions at Launch</span>
              <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:4}}>
                {functions.map((f,i)=>(
                  <div key={i} style={{padding:"18px 20px",background:DARK3,display:"flex",alignItems:"center",gap:14,border:`1px solid ${DARK4}`,transition:"all .2s"}}
                    onMouseEnter={e=>{e.currentTarget.style.background=DARK4;e.currentTarget.style.transform="translateX(6px)"}}
                    onMouseLeave={e=>{e.currentTarget.style.background=DARK3;e.currentTarget.style.transform="translateX(0)"}}>
                    <div style={{width:10,height:10,background:f.color,flexShrink:0,boxShadow:`0 0 10px ${f.color}`}}/>
                    <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:WHITE,letterSpacing:1}}>{f.name}</span>
                  </div>
                ))}
              </div>
            </Reveal>
            <Reveal delay={.4}>
              <div style={{marginTop:32,padding:"24px",border:`1px dashed ${VIOLET}`,background:`${VIOLET}08`}}>
                <span className="meta" style={{display:"block",marginBottom:12,color:VIOLET}}>// M-shaped talent model</span>
                <p style={{color:LIGHT,fontSize:13,lineHeight:1.7}}>
                  Missions don't just target your current role — they stretch you into adjacent disciplines. The agent maps your growth goal to cross-functional skills across Craft, Communications, Leadership, and Growth.
                </p>
              </div>
            </Reveal>
            <Reveal delay={.5}>
              <div style={{marginTop:16,padding:"18px 22px",background:DARK3,border:`1px solid ${DARK4}`}}>
                <span className="meta" style={{display:"block",marginBottom:8,color:CYAN}}>// recommendation source</span>
                <p style={{color:LIGHT,fontSize:12,lineHeight:1.65}}>
                  Agent recommendations come from the <span style={{color:WHITE}}>WPP Open Agent Hub</span> — the curated list of Super Agents and Workspace Agents already mapped to disciplines. The Companion uses that mapping as the spine for what gets surfaced to whom, for which mission.
                </p>
              </div>
            </Reveal>
          </div>
        </div>
      </div>
    </div>

    {/* TICKER 3 */}
    <Marquee items={["TELL THE STORIES","SHARE THE WIN","TAG THE STANDOUTS","ELEVATE THE BEST","REPEAT MONTHLY"]} color={GREEN} bg={DARK2} speed="fast"/>

    {/* UGC */}
    <div id="ugc" style={{background:DARK2,padding:"120px 32px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:80,right:"max(40px, calc(50% - 480px))",width:160,zIndex:1}}>
        <img src={GIFS.g5} alt="" style={{width:"100%",border:`2px solid ${NEON}`,boxShadow:`6px 6px 0 ${CYAN}`,transform:"rotate(4deg)",display:"block"}}/>
      </div>
      <div style={{maxWidth:1200,margin:"0 auto",position:"relative"}}>
        <Reveal>
          <span className="label" style={{color:NEON}}>▸ Feedback Loop</span>
          <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(48px,7vw,72px)",lineHeight:.95,letterSpacing:-1,margin:"16px 0 0"}}>
            The UGC <span style={{color:NEON,fontStyle:"italic"}}>Flywheel</span>
          </h2>
          <span className="meta" style={{display:"block",marginTop:12,fontSize:22}}>// solving the articulation problem</span>
        </Reveal>
        <Reveal delay={.15}>
          <div style={{marginTop:48,padding:"44px 48px",background:DARK,border:`1px solid ${DARK4}`,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${NEON},${CYAN},${GREEN},${VIOLET},${AMBER})`}}/>
            <span className="label" style={{color:NEON,display:"block",marginBottom:24}}>▸ The Unpromptable Mad Lib</span>
            <p style={{fontSize:18,color:LIGHT,lineHeight:2.5}}>
              I was thinking about <MadLibBlank color={NEON} width={90} active={madlibActive===0}/>,
              so I went into Open and used <MadLibBlank color={CYAN} width={80} active={madlibActive===1}/> and <MadLibBlank color={CYAN} width={80} active={madlibActive===2}/> and asked it to <MadLibBlank color={GREEN} width={100} active={madlibActive===3}/> and it gave me this awesome <MadLibBlank color={VIOLET} width={90} active={madlibActive===4}/> and now my whole team is using it for <MadLibBlank color={AMBER} width={100} active={madlibActive===5}/>.
            </p>
          </div>
        </Reveal>
        <Reveal delay={.2}>
          <FilledExamples/>
        </Reveal>

        <Reveal delay={.22}>
          <p style={{marginTop:32,color:LIGHT,fontSize:14,lineHeight:1.7,maxWidth:760}}>
            <span style={{color:CYAN,fontFamily:"'DM Mono',monospace",fontSize:12,letterSpacing:1.5}}>// HOME BASE →</span> <span style={{color:WHITE,fontWeight:600}}>Viva Engage</span> is where the flywheel lives for WPP Media. A dedicated community for missions, Mad Libs, and monthly recaps — built for UGC, not buried in a chat tab. MFG keeps Google Chat as its native surface; everything else aggregates in Viva.
          </p>
        </Reveal>
        <Reveal delay={.25}>
          <div className="ugc-grid" style={{marginTop:20,display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
            {[
              {t:"Google Chat",d:"MFG / Google-stack",c:NEON},
              {t:"Viva Engage",d:"Rest of WPP Media",c:CYAN},
              {t:"Curation",d:"You tag standouts",c:GREEN},
              {t:"Elevation",d:"Council amplifies",c:VIOLET},
            ].map((c,i)=>(
              <div key={i} style={{padding:"20px 22px",background:DARK3,borderTop:`3px solid ${c.c}`}}>
                <h4 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:WHITE,letterSpacing:1}}>{c.t}</h4>
                <p style={{color:MUTED,fontSize:12,marginTop:4}}>{c.d}</p>
              </div>
            ))}
          </div>
        </Reveal>
      </div>
    </div>

    {/* MONTH IN THE LIFE */}
    <div style={{borderTop:`1px solid ${DARK4}`,background:DARK2}}>
      <div id="day" style={{padding:"120px 32px",maxWidth:1200,margin:"0 auto",position:"relative"}}>
        <Reveal>
          <span className="label" style={{color:GREEN}}>▸ Walkthrough</span>
          <div style={{display:"flex",alignItems:"center",gap:96,marginTop:16,flexWrap:"wrap"}}>
            <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(48px,7vw,72px)",lineHeight:.95,letterSpacing:-1,margin:0,maxWidth:700}}>
              Month in the life of <span style={{color:GREEN,fontStyle:"italic"}}>a mission</span>.
            </h2>
            <img src={GIFS.g2} alt="" style={{width:170,border:`2px solid ${AMBER}`,boxShadow:`6px 6px 0 ${NEON}`,transform:"rotate(-2deg)",display:"block",flexShrink:0}}/>
          </div>
        </Reveal>

        <div style={{marginTop:64,position:"relative"}}>
          <div className="how-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:24,position:"relative",zIndex:1}}>
            {[
              {c:NEON,title:"The Email Lands",body:"Subject line: \"Your monthly mission is ready.\" One click into the Mission Companion in WPP Open.",chip:"✉ INBOX"},
              {c:CYAN,title:"Your Brief, Personalized",body:"The Companion asks for your role, your goal, and your AI comfort level. It hands you a brief tailored to your function — not the generic version your VP got.",chip:"⚙ COMPANION"},
              {c:VIOLET,title:"You Run It On Real Work",body:"You drop your actual work into the recommended agents. They catch things you'd been waving past for weeks. You revise. The work gets sharper.",chip:"⚡ AGENT STACK"},
              {c:GREEN,title:"You Tell the Story",body:"You drop a filled-in Mad Lib in the channel. Two people from other functions DM you to ask how you did it. The Council clips it for the monthly recap.",chip:"📣 SHARED"},
            ].map((s,i)=>(
              <Reveal key={i} delay={i*.1} style={{position:"relative"}}>
                <div style={{padding:"24px 24px 26px",background:DARK3,border:`1px solid ${DARK4}`,borderTop:`3px solid ${s.c}`,height:"100%"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",marginBottom:12}}>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:MUTED,letterSpacing:1.5}}>{s.chip}</span>
                  </div>
                  <h4 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:WHITE,letterSpacing:1,lineHeight:1.1,marginBottom:10}}>{s.title}</h4>
                  <p style={{color:LIGHT,fontSize:13,lineHeight:1.6}}>{s.body}</p>
                </div>
              </Reveal>
            ))}
          </div>
        </div>
      </div>
    </div>

    {/* SIGNALS — how we'll know it's working */}
    <div id="signals" style={{padding:"120px 32px",maxWidth:1200,margin:"0 auto",position:"relative"}}>
      <Reveal>
        <span className="label" style={{color:CYAN}}>▸ Accountability</span>
        <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(48px,7vw,80px)",lineHeight:.95,letterSpacing:-1,margin:"16px 0 0",maxWidth:900}}>
          How we'll know <span style={{color:CYAN,fontStyle:"italic"}}>it's working</span><span style={{color:CYAN}}>.</span>
        </h2>
      </Reveal>

      <div className="ask-grid" style={{marginTop:56,display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
        {[
          {n:"01",label:"Participation",t:"At least 25% of WPP Media tries one mission in the first 90 days.",c:NEON},
          {n:"02",label:"Sharing",t:"By Month 6, the chat channels hold 100+ filled-in Mad Libs.",c:GREEN},
          {n:"03",label:"Growth",t:"By Month 12, the Council can find 5 people whose career trajectory changed because of the missions.",c:VIOLET},
        ].map((s,i)=>(
          <Reveal key={i} delay={i*.08} style={{padding:"32px 36px",background:DARK3,border:`1px solid ${DARK4}`,borderLeft:`3px solid ${s.c}`,position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:s.c,border:`1px solid ${s.c}`,padding:"2px 8px"}}>{s.n}</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:MUTED,letterSpacing:1.5}}>{s.label.toUpperCase()}</span>
            </div>
            <h4 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:WHITE,letterSpacing:1,lineHeight:1.15}}>{s.t}</h4>
          </Reveal>
        ))}
      </div>

    </div>

    {/* THE ASK */}
    <div id="ask" style={{padding:"120px 32px",maxWidth:1200,margin:"0 auto",position:"relative"}}>
      <Reveal>
        <span className="label" style={{color:NEON}}>▸ The Ask</span>
        <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(48px,8vw,80px)",lineHeight:.95,letterSpacing:-1,margin:"16px 0 0",maxWidth:900}}>
          What we need from the <span style={{color:NEON,fontStyle:"italic"}}>Council</span><span style={{color:NEON}}>.</span>
        </h2>
      </Reveal>
      <div style={{marginTop:48,display:"flex",flexDirection:"column",borderTop:`1px solid ${DARK4}`}}>
        {[
          {n:"01",t:"Function Leads",d:"One point of contact per function to validate role profiles and seed early adoption."},
          {n:"02",t:"E2E Alignment",d:"Coordination with End-2-End team to align themes with agent rollout dates."},
          {n:"03",t:"Distribution Support",d:"Amplify the monthly mission through existing forums, groups, and regional channels."},
          {n:"04",t:"UGC Curation",d:"Help identify and elevate the best submissions across the org each month."},
        ].map((a,i)=>(
          <Reveal key={i} delay={i*.06} style={{display:"flex",alignItems:"center",gap:28,padding:"22px 8px",borderBottom:`1px solid ${DARK4}`}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:NEON,letterSpacing:1.5,flexShrink:0,width:36}}>{a.n}</span>
            <h4 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:WHITE,letterSpacing:1,margin:0,flexShrink:0,minWidth:240}}>{a.t}</h4>
            <p style={{color:LIGHT,fontSize:14,lineHeight:1.6,margin:0}}>{a.d}</p>
          </Reveal>
        ))}
      </div>
      <Reveal delay={.4}>
        <div style={{marginTop:64,padding:"40px 44px",border:`2px solid ${NEON}`,position:"relative",overflow:"hidden",background:`${NEON}08`,boxShadow:`10px 10px 0 ${CYAN}`}}>
          <div style={{position:"absolute",top:0,left:0,width:"100%",height:3,background:NEON}}/>
          <h3 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:40,color:WHITE,letterSpacing:1.5,lineHeight:1.1}}>
            Don't just be a <span style={{color:MUTED,fontStyle:"italic"}}>"prompter."</span> Become <span style={{color:NEON}}>UNPROMPTABLE.</span><span className="blink" style={{color:NEON}}>_</span>
          </h3>
        </div>
      </Reveal>
    </div>

    {/* FINAL TICKER */}
    <Marquee items={["THANK YOU","GRACIAS","DANKE","ありがとう","MERCI"]} color={NEON} bg={DARK3} speed="" />

    <div style={{padding:"40px",textAlign:"center",borderTop:`1px solid ${DARK4}`}}>
      <span className="meta">UNPROMPTABLE — CONFIDENTIAL — APRIL 2026 — <span style={{color:NEON}}>★</span> become unpromptable</span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
